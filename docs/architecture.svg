<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 650" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0" y="0" width="980" height="650" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
    .zone { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 14; }
    .title { font-size: 15px; font-weight: 600; fill: #0f172a; }
    .label { font-size: 12.5px; fill: #334155; }
    .small { font-size: 11px; fill: #64748b; }
    .zlabel { font-size: 12px; font-weight: 600; fill: #64748b; letter-spacing: .04em; }
    .flow { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .accent { fill: #eef2ff; stroke: #6366f1; }
  </style>

  <!-- Sources -->
  <rect class="box" x="24" y="60" width="188" height="86" rx="10"/>
  <text class="title" x="40" y="88">WhatsApp</text>
  <text class="label" x="40" y="108">Baileys socket · chats +</text>
  <text class="label" x="40" y="124">self-chat console + photos</text>

  <rect class="box" x="24" y="170" width="188" height="70" rx="10"/>
  <text class="title" x="40" y="198">Dashboard</text>
  <text class="label" x="40" y="218">simulator · notebook import</text>

  <rect class="box" x="24" y="264" width="188" height="60" rx="10"/>
  <text class="title" x="40" y="290">Notebook photo</text>
  <text class="label" x="40" y="308">vision OCR import</text>

  <!-- AWS zone -->
  <rect class="zone" x="248" y="28" width="330" height="486" rx="14"/>
  <text class="zlabel" x="268" y="52">AWS · eu-west-1</text>

  <rect class="box" x="268" y="66" width="290" height="188" rx="10"/>
  <text class="title" x="284" y="92">Amazon EC2 — agent runtime</text>
  <text class="label" x="284" y="114">Bun + Hono API (long-lived process)</text>
  <text class="label" x="284" y="134">ingest → extraction → confidence gate</text>
  <text class="label" x="284" y="154">recall: classify → hybrid retrieve → pack</text>
  <text class="label" x="284" y="174">settlement engine · decay loop</text>
  <text class="label" x="284" y="194">Next.js dashboard (server proxy)</text>
  <text class="small" x="284" y="214">Caddy HTTPS :443 → web :3000</text>
  <text class="small" x="284" y="230">API loopback-only :8787</text>

  <rect class="box" x="268" y="286" width="290" height="64" rx="10"/>
  <text class="title" x="284" y="312">Amazon S3</text>
  <text class="label" x="284" y="332">WhatsApp media · notebook photos</text>

  <rect class="box" x="268" y="376" width="290" height="112" rx="10"/>
  <text class="title" x="284" y="402">OpenAI API</text>
  <text class="label" x="284" y="422">gpt-5-mini: extraction · answers ·</text>
  <text class="label" x="284" y="438">vision OCR (paper notebooks)</text>
  <text class="label" x="284" y="458">text-embedding-3-small @ 1024 dims</text>
  <text class="small" x="284" y="476">(model layer; swappable via env)</text>

  <!-- CockroachDB zone -->
  <rect class="zone" x="614" y="28" width="342" height="486" rx="14"/>
  <text class="zlabel" x="634" y="52">CockroachDB Cloud — the memory layer</text>

  <rect class="box accent" x="634" y="66" width="302" height="150" rx="10"/>
  <text class="title" x="650" y="92">Memory store (single database)</text>
  <text class="label" x="650" y="114">episodic · semantic · procedural · ledger</text>
  <text class="label" x="650" y="134">entity graph (nodes + weighted edges)</text>
  <text class="label" x="650" y="154">provenance: every fact → source message</text>
  <text class="label" x="650" y="174">VECTOR(1024) embeddings, transactionally</text>
  <text class="label" x="650" y="190">consistent with the facts they index</text>

  <rect class="box accent" x="634" y="238" width="302" height="70" rx="10"/>
  <text class="title" x="650" y="264">Distributed Vector Index</text>
  <text class="label" x="650" y="284">CREATE VECTOR INDEX · semantic recall</text>
  <text class="small" x="650" y="298">EXPLAIN shows the vector-search node</text>

  <rect class="box accent" x="634" y="330" width="302" height="88" rx="10"/>
  <text class="title" x="650" y="356">Transactional ledger</text>
  <text class="label" x="650" y="376">open debts pinned — never decay</text>
  <text class="label" x="650" y="392">payments settle debts atomically</text>
  <text class="label" x="650" y="408">SERIALIZABLE + retry discipline</text>

  <rect class="box" x="634" y="440" width="302" height="58" rx="10"/>
  <text class="title" x="650" y="464">Managed MCP Server</text>
  <text class="label" x="650" y="482">Claude Code dev workflow (.mcp.json)</text>

  <!-- Flows -->
  <path class="flow" d="M 212 103 L 268 110"/>
  <path class="flow" d="M 212 205 L 268 170"/>
  <path class="flow" d="M 212 294 L 268 230"/>
  <path class="flow" d="M 413 254 L 413 286"/>
  <path class="flow" d="M 413 350 L 413 376"/>
  <path class="flow" d="M 558 140 L 634 140"/>
  <path class="flow" d="M 634 273 L 558 200" />

  <text class="small" x="566" y="128">reads/writes</text>
  <text class="small" x="560" y="248">vector recall</text>

  <!-- bottom strip: the loop -->
  <rect class="box" x="24" y="544" width="932" height="82" rx="10"/>
  <text class="title" x="44" y="570">The loop</text>
  <text class="label" x="44" y="592">write: message → extract facts (confidence-scored) → gate (0.8; 0.9 for money; below queues for the merchant) → memory + ledger</text>
  <text class="label" x="44" y="612">recall: classify → graph + vector retrieve → token-budgeted pack, traced → grounded answer · unused memories decay; open debts never do</text>
</svg>
